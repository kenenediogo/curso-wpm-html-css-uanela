<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linhas Grid</title>
    <style>
        .container {
            /* Valores do Grid: px, %, auto, fr */
            display: grid;
            grid-template-rows: 500px 500px;
            grid-template-rows: auto 500px 0 auto 800px 300px 100px auto;
            grid-template-rows: 5fr 8fr;
            grid-template-rows: 20% 20% 15%;
            /* grid-template-rows: repeat(10, 20%); */
            grid-auto-rows: 50%; /* define as linhas que não tiveram valores atribuidos */
            grid-template-columns: repeat(2, 1fr);
            /* gap: 1rem; */
            row-gap: 1rem;
        }

        .item {
            background-color: #06f;
            border: 1px solid red;
            text-align: center;
            font-weight: bold;
            color: #fff;
            font-size: 1.rem;
            padding: 3rem;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
        <div class="item">Item 7</div>
        <div class="item">Item 8</div>
        <div class="item">Item 9</div>
        <div class="item">Item 10</div>
    </div>
</body>
</html>
