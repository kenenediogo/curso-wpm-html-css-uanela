<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transições CSS</title>
    <style>
        .caixa {
            background-color: blue;
            width: 75px;
            height: 75px;
            /* transition-property: background-color, border-radius;
            transition-duration: 2s;
            transition-delay: 2s;
            transition-timing-function: ease-in-out; */

            /* Short hand */
            transition: all o.2s, background-color 2s ease-in-out 2s,
                border-radious 1s ease-in-out;
        }

        .caixa:hover {
            background-color: red;
            border-radius: 50%;
            width: 200px;
        }

        /* Quando clicamos em um elemento */
        .caixa:active {
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="caixa"></div>
</body>
</html>
